<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>GlowAI – Generating</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/glow.css" />
    <style>
      .main {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        padding: 64px 0 64px;
      }

      .heading-block {
        padding: 0 24px 24px;
      }
      .heading-block h1 {
        font-size: 20px;
        font-weight: 700;
        line-height: 28px;
        color: #696361;
        margin-bottom: 4px;
      }
      .heading-block p {
        font-size: 14px;
        font-weight: 400;
        line-height: 20px;
        color: #8a827f;
      }

      .progress-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 0 0 32px;
      }
      .progress-wrap {
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
        width: 280px;
      }
      .progress-pct {
        font-size: 20px;
        font-weight: 500;
        line-height: 24px;
        color: #696361;
        text-align: center;
        width: 100%;
      }

      .progress-track {
        width: 100%;
        height: 20px;
        background: #faece6;
        border-radius: 20px;
        padding: 2px 3px;
      }
      .progress-fill {
        height: 100%;
        background: #e16d3e;
        border-radius: 20px;
        width: 0%;
        transition: width 0.4s ease;
      }

      .progress-status {
        font-size: 14px;
        font-weight: 500;
        line-height: 20px;
        color: #e16d3e;
        text-align: center;
      }

      .steps {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 0 24px 16px;
      }
      .step {
        background: #fdf6f4;
        border-radius: 16px;
        padding: 12px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .step-icon {
        width: 28px;
        height: 28px;
        border-radius: 999px;
        background: #e4d7d1;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.3s ease;
      }
      .step-icon.done {
        background: #66b856;
      }
      .step-dot {
        width: 8px;
        height: 8px;
        background: rgba(255, 255, 255, 0.5);
        border-radius: 999px;
      }
      .step-check {
        display: none;
      }
      .step-icon.done .step-dot {
        display: none;
      }
      .step-icon.done .step-check {
        display: block;
      }

      .step-label {
        font-size: 14px;
        font-weight: 500;
        line-height: 20px;
        color: #b2a8a3;
        transition: color 0.3s ease;
        white-space: nowrap;
      }
      .step-label.done {
        color: #696361;
      }
    </style>
  </head>
  <body>
    <div class="cursor rounded"></div>
    <div class="phone" data-no-nav>
      <div class="main">
        <div class="heading-block">
          <h1>Building your kitchen design</h1>
          <p>This takes just a moment</p>
        </div>

        <div class="progress-section">
          <div class="progress-wrap">
            <div class="progress-pct" id="pctLabel">0% Complete</div>
            <div class="progress-track">
              <div class="progress-fill" id="progressFill"></div>
            </div>
          </div>
          <div class="progress-status" id="statusText">
            Preparing your design…
          </div>
        </div>

        <div class="steps">
          <div class="step">
            <div class="step-icon" id="icon0">
              <div class="step-dot"></div>
              <svg
                class="step-check"
                width="14"
                height="14"
                viewBox="0 0 14 14"
                fill="none"
              >
                <path
                  d="M2.5 7L5.5 10L11.5 4"
                  stroke="white"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </div>
            <span class="step-label" id="label0">Room scan processed</span>
          </div>
          <div class="step">
            <div class="step-icon" id="icon1">
              <div class="step-dot"></div>
              <svg
                class="step-check"
                width="14"
                height="14"
                viewBox="0 0 14 14"
                fill="none"
              >
                <path
                  d="M2.5 7L5.5 10L11.5 4"
                  stroke="white"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </div>
            <span class="step-label" id="label1">Style profile created</span>
          </div>
          <div class="step">
            <div class="step-icon" id="icon2">
              <div class="step-dot"></div>
              <svg
                class="step-check"
                width="14"
                height="14"
                viewBox="0 0 14 14"
                fill="none"
              >
                <path
                  d="M2.5 7L5.5 10L11.5 4"
                  stroke="white"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </div>
            <span class="step-label" id="label2">Furniture sourced</span>
          </div>
          <div class="step">
            <div class="step-icon" id="icon3">
              <div class="step-dot"></div>
              <svg
                class="step-check"
                width="14"
                height="14"
                viewBox="0 0 14 14"
                fill="none"
              >
                <path
                  d="M2.5 7L5.5 10L11.5 4"
                  stroke="white"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </div>
            <span class="step-label" id="label3">Design render ready</span>
          </div>
        </div>
      </div>
    </div>
    <script src="assets/glow.js"></script>
    <script>
      const fill = document.getElementById("progressFill");
      const pctLabel = document.getElementById("pctLabel");
      const statusText = document.getElementById("statusText");

      const steps = [
        { pctEnd: 25, status: "Analysing your space…", completeAt: 20 },
        { pctEnd: 55, status: "Building style profile…", completeAt: 45 },
        { pctEnd: 80, status: "Sourcing furniture…", completeAt: 70 },
        { pctEnd: 100, status: "Rendering your design…", completeAt: 95 },
      ];

      let pct = 0;
      const stepCompleted = [false, false, false, false];

      function markStep(i) {
        if (stepCompleted[i]) return;
        stepCompleted[i] = true;
        document.getElementById("icon" + i).classList.add("done");
        document.getElementById("label" + i).classList.add("done");
      }

      function tick() {
        if (pct >= 100) {
          pctLabel.textContent = "100% Complete";
          fill.style.width = "100%";
          steps.forEach((_, i) => markStep(i));
          statusText.textContent = "Design ready!";
          setTimeout(() => {
            window.location.href = "item-swap-1.html";
          }, 1000);
          return;
        }
        pct = Math.min(100, pct + 0.8);
        fill.style.width = pct + "%";
        pctLabel.textContent = Math.floor(pct) + "% Complete";
        steps.forEach((step, i) => {
          if (
            pct >=
            step.pctEnd -
              (step.pctEnd - (i > 0 ? steps[i - 1].pctEnd : 0)) * 0.3
          )
            statusText.textContent = step.status;
          if (pct >= step.completeAt) markStep(i);
        });
        setTimeout(tick, 40);
      }

      setTimeout(tick, 600);
    </script>
  </body>
</html>
