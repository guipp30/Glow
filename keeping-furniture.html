<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glow – Keeping Furniture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/glow.css" />
  <style>
    .main {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      padding: 40px 0 64px;
    }

    .body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .heading { padding: 0 24px; flex-shrink: 0; }
    .heading h1 { font-size: 20px; font-weight: 700; line-height: 28px; color: #696361; }
    .heading p  { font-size: 14px; line-height: 22.75px; color: #8a827f; margin-top: 4px; max-width: 342px; }

    .detected-divider {
      display: flex; align-items: center; gap: 12px;
      padding: 0 24px; margin-top: 16px; flex-shrink: 0;
    }
    .divider-line { flex: 1; height: 1px; background: #e4d7d1; }
    .detected-badge {
      display: flex; align-items: center; gap: 6px;
      background: #ecf7fc; border-radius: 999px; padding: 4px 12px; flex-shrink: 0;
    }
    .detected-dot { width: 6px; height: 6px; background: #3db2e1; border-radius: 50%; flex-shrink: 0; }
    .detected-badge span { font-size: 11px; font-weight: 600; color: #3db2e1; white-space: nowrap; }

    .items-list { display: flex; flex-direction: column; gap: 10px; padding: 12px 24px 0; flex-shrink: 0; }

    .item-card {
      display: flex; align-items: center; gap: 12px;
      padding: 13px; border-radius: 16px;
      border: 1px solid #e4d7d1; background: #fff;
      cursor: pointer; transition: background 0.2s, border-color 0.2s;
    }
    .item-card.selected { background: #f6d2c3; border-color: #eb9d7e; }

    .item-thumb {
      width: 48px; height: 48px; border-radius: 20px;
      background: #fff; overflow: hidden; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .item-thumb img { width: 76.3%; height: 76.3%; object-fit: contain; }

    .item-info { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .item-name   { font-size: 14px; font-weight: 600; line-height: 20px; color: #696361; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-status { font-size: 12px; line-height: 16px; color: #b2a8a3; }
    .item-card.selected .item-status { color: #e16d3e; }

    .item-action {
      width: 32px; height: 32px; border-radius: 999px;
      border: 1px solid #e4d7d1; background: #fcf2ee;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s, border-color 0.2s;
    }
    .item-card.selected .item-action { background: #e16d3e; border-color: #e16d3e; }

    .add-card {
      display: flex; align-items: center; gap: 12px;
      padding: 13px; border-radius: 16px;
      border: 1px solid #e4d7d1; background: #fff; cursor: pointer;
    }
    .add-info { flex: 1; display: flex; flex-direction: column; }
    .add-title { font-size: 14px; font-weight: 600; line-height: 20px; color: #696361; }
    .add-sub   { font-size: 12px; line-height: 16px; color: #b2a8a3; }
    .add-btn {
      width: 32px; height: 32px; border-radius: 999px;
      border: 1px solid #e4d7d1; background: #fcf2ee;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    }

    .info-banner {
      display: flex; align-items: center; gap: 8px;
      background: #ecf7fc; border-radius: 20px;
      padding: 10px 16px; margin: 12px 24px 0; flex-shrink: 0;
    }
    .info-banner span { font-size: 12px; font-weight: 500; color: #3db2e1; white-space: nowrap; }
    #keptCount { font-weight: 700; }
  </style>
</head>
<body>
<div class="phone" data-nav-active="Home">

  <div class="main">
    <div class="top-nav">
      <button class="back-btn" aria-label="Go back"></button>
      <span class="step-label">Step 3 of 5</span>
      <button class="skip-btn" onclick="window.location.href='describe-idea.html'">Skip</button>
    </div>

    <div class="body">
      <div class="heading">
        <h1>Got furniture you're keeping?</h1>
        <p>Upload a photo of anything you want to keep, or select from what we detected in your scan.</p>
      </div>

      <div class="detected-divider">
        <div class="divider-line"></div>
        <div class="detected-badge">
          <div class="detected-dot"></div>
          <span>Detected from your scan</span>
        </div>
        <div class="divider-line"></div>
      </div>

      <div class="items-list" id="itemsList">
        <div class="item-card selected" data-item="table" onclick="toggleItem(this)">
          <div class="item-thumb">
            <img src="assets/decorative/keeping/table_keep.avif" onerror="this.src='assets/decorative/keeping/table_keep.png'" alt="Table" />
          </div>
          <div class="item-info">
            <span class="item-name">SKÅLSTA Table</span>
            <span class="item-status">Keep as-is</span>
          </div>
          <div class="item-action">
            <svg class="icon-check" width="15" height="15" viewBox="0 0 15 15" fill="none">
              <path d="M2.5 7.5L6 11L12.5 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <svg class="icon-plus" width="15" height="15" viewBox="0 0 15 15" fill="none" style="display:none">
              <path d="M7.5 2.5V12.5M2.5 7.5H12.5" stroke="#e16d3e" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
        </div>

        <div class="item-card" data-item="chair" onclick="toggleItem(this)">
          <div class="item-thumb">
            <img src="assets/decorative/keeping/chair_keep.avif" onerror="this.src='assets/decorative/keeping/chair_keep.png'" alt="Chair" />
          </div>
          <div class="item-info">
            <span class="item-name">SKOGSTA Chair</span>
            <span class="item-status">Replace</span>
          </div>
          <div class="item-action">
            <svg class="icon-check" width="15" height="15" viewBox="0 0 15 15" fill="none" style="display:none">
              <path d="M2.5 7.5L6 11L12.5 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <svg class="icon-plus" width="15" height="15" viewBox="0 0 15 15" fill="none">
              <path d="M7.5 2.5V12.5M2.5 7.5H12.5" stroke="#e16d3e" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
        </div>

        <div class="add-card">
          <div class="add-info">
            <span class="add-title">Add Furniture</span>
            <span class="add-sub">Add furniture that was not detected</span>
          </div>
          <div class="add-btn">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <path d="M7.5 2.5V12.5M2.5 7.5H12.5" stroke="#e16d3e" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="info-banner">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1L8.12 5.38L12.5 6.5L8.12 7.62L7 12L5.88 7.62L1.5 6.5L5.88 5.38L7 1Z" fill="#3db2e1"/>
        </svg>
        <span><span id="keptCount">1 item</span> kept — AI will design around these</span>
      </div>
    </div>
  </div>

  <div class="cta">
    <button class="btn-primary" onclick="window.location.href='describe-idea.html'">Continue</button>
  </div>

</div>
<script src="assets/glow.js"></script>
<script>
  function toggleItem(card) {
    const isSelected = card.classList.contains('selected');
    card.classList.toggle('selected');
    const check  = card.querySelector('.icon-check');
    const plus   = card.querySelector('.icon-plus');
    const status = card.querySelector('.item-status');
    if (!isSelected) {
      check.style.display = ''; plus.style.display = 'none';
      status.textContent = 'Keep as-is';
    } else {
      check.style.display = 'none'; plus.style.display = '';
      status.textContent = 'Replace';
    }
    updateCount();
  }

  function updateCount() {
    const kept = document.querySelectorAll('.item-card.selected').length;
    document.getElementById('keptCount').textContent = kept + (kept === 1 ? ' item' : ' items');
  }

  updateCount();
</script>
</body>
</html>
