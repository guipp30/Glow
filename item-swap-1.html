<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>GlowAI – Item Swap</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/glow.css" />
  <style>
    .main {
      position: absolute; inset: 0;
      overflow-y: auto; overflow-x: hidden;
      padding-top: 56px; padding-bottom: 160px;
      scrollbar-width: none;
    }
    .main::-webkit-scrollbar { display: none; }

    .section-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: #696361; border-radius: 999px;
      padding: 6px 12px; margin: 16px 0 12px 24px;
    }
    .section-badge span { font-size: 12px; font-weight: 600; color: #fff; line-height: 16px; }
    .section-badge .sep { opacity: 0.4; }
    .section-badge .title { opacity: 0.6; }

    .video-wrap {
      position: relative; width: 345px; height: 210px;
      border-radius: 24px; overflow: hidden;
      margin: 0 auto; background: #1a1a1a; cursor: pointer;
    }
    .video-wrap video { width: 100%; height: 100%; object-fit: cover; display: block; }

    .play-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s;
    }
    .video-wrap:hover .play-overlay,
    .video-wrap.paused .play-overlay { opacity: 1; }
    .play-btn {
      width: 48px; height: 48px; background: rgba(0,0,0,0.45);
      border-radius: 999px; display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }

    .fullscreen-btn {
      position: absolute; bottom: 12px; right: 12px;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; background: rgba(0,0,0,0.3); border-radius: 6px;
    }
    .fullscreen-btn img { width: 18px; height: 18px; filter: brightness(0) invert(1); }

    .tags { display: flex; gap: 8px; padding: 12px 20px 0; }
    .tag {
      background: #ecf7fc; color: #22627c;
      font-size: 12px; font-weight: 600; line-height: 16px;
      padding: 4px 12px; border-radius: 999px; white-space: nowrap;
    }

    .description { padding: 10px 24px 0; font-size: 14px; font-weight: 400; line-height: 22px; color: #8a827f; }

    .product-list { padding: 16px 20px; }
    .list-label   { font-size: 12px; font-weight: 600; color: #b2a8a3; line-height: 16px; margin-bottom: 8px; }

    .product-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0 11px; border-bottom: 1px solid #fbf0eb;
    }
    .product-info { display: flex; flex-direction: column; gap: 6px; }
    .product-name-row { display: flex; align-items: center; gap: 8px; }
    .dot { width: 6px; height: 6px; border-radius: 999px; flex-shrink: 0; }
    .dot.green  { background: #5da74e; }
    .dot.orange { background: #cd6338; }
    .product-name  { font-size: 14px; font-weight: 400; color: #696361; line-height: 20px; white-space: nowrap; }
    .product-price { font-size: 14px; font-weight: 600; line-height: 20px; padding-left: 16px; }
    .product-price.normal      { color: #696361; }
    .product-price.over-budget { color: #cd6338; }

    .swap-btn {
      padding: 12px; cursor: pointer; border: none; background: none;
      display: flex; align-items: center; justify-content: center;
      border-radius: 999px; flex-shrink: 0; transition: background 0.15s;
    }
    .swap-btn:hover { background: #fdf2ed; }
    .swap-btn img   { width: 24px; height: 24px; }

    .total-row { display: flex; align-items: center; justify-content: space-between; padding-top: 10px; }
    .total-label, .total-value { font-size: 14px; font-weight: 700; color: #696361; line-height: 20px; }
  </style>
</head>
<body>
<div class="phone" data-nav-active="Home">

  <div class="main">
    <div class="section-badge">
      <span class="title">Your Kitchen</span>
      <span class="sep">·</span>
      <span>render</span>
    </div>

    <div class="video-wrap paused" id="videoWrap">
      <video id="kitchenVideo" src="assets/videos/kitchen_after.mp4" loop muted playsinline></video>
      <div class="play-overlay">
        <div class="play-btn">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path id="playIcon" d="M6 4.5L14 9L6 13.5V4.5Z" fill="white"/>
          </svg>
        </div>
      </div>
      <div class="fullscreen-btn" id="fullscreenBtn" title="Full screen">
        <img src="assets/icons/fullscreen.svg" alt="Fullscreen" />
      </div>
    </div>

    <div class="tags">
      <span class="tag">Modern</span>
      <span class="tag">Bright</span>
    </div>

    <p class="description">Clean lines, white surfaces, and warm lighting built around your dining table.</p>

    <div class="product-list">
      <p class="list-label">In this design</p>

      <div class="product-row">
        <div class="product-info">
          <div class="product-name-row"><div class="dot green"></div><span class="product-name">KNOXHULT Cabinets</span></div>
          <span class="product-price normal">€349</span>
        </div>
        <button class="swap-btn" onclick="window.location.href='item-swap-2.html'"><img src="assets/icons/swap.svg" alt="Swap" /></button>
      </div>

      <div class="product-row">
        <div class="product-info">
          <div class="product-name-row"><div class="dot orange"></div><span class="product-name">TRETTIOEN Lamp</span></div>
          <span class="product-price over-budget">€300</span>
        </div>
        <button class="swap-btn" onclick="window.location.href='item-swap-2.html'"><img src="assets/icons/swap.svg" alt="Swap" /></button>
      </div>

      <div class="product-row">
        <div class="product-info">
          <div class="product-name-row"><div class="dot green"></div><span class="product-name">HILLESJÖN Sink</span></div>
          <span class="product-price normal">€196</span>
        </div>
        <button class="swap-btn"><img src="assets/icons/swap.svg" alt="Swap" /></button>
      </div>

      <div class="total-row">
        <span class="total-label">Total</span>
        <span class="total-value">€845</span>
      </div>
    </div>
  </div>

  <div class="cta">
    <button class="btn-primary" onclick="window.location.href='shopping-list.html'">Continue</button>
  </div>

</div>
<script src="assets/glow.js"></script>
<script>
  const video    = document.getElementById('kitchenVideo');
  const videoWrap = document.getElementById('videoWrap');
  const playIcon  = document.getElementById('playIcon');

  video.pause();

  videoWrap.addEventListener('click', e => {
    if (e.target.closest('#fullscreenBtn')) return;
    if (video.paused) {
      video.play();
      videoWrap.classList.remove('paused');
      playIcon.setAttribute('d', 'M6 3H8V15H6V3ZM10 3H12V15H10V3Z');
    } else {
      video.pause();
      videoWrap.classList.add('paused');
      playIcon.setAttribute('d', 'M6 4.5L14 9L6 13.5V4.5Z');
    }
  });

  document.getElementById('fullscreenBtn').addEventListener('click', e => {
    e.stopPropagation();
    if (video.requestFullscreen) video.requestFullscreen();
    else if (video.webkitEnterFullscreen) video.webkitEnterFullscreen();
  });
</script>
</body>
</html>
