<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Glow – Shopping List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/glow.css" />
    <style>
      .main {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        padding-top: 40px;
        padding-bottom: 100px;
        overflow-y: auto;
      }

      /* ─── Header (back + title, no step label) ─── */
      .page-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 20px 20px 16px;
        flex-shrink: 0;
      }
      .back-btn {
        background: #fff;
        border: 1px solid #e4d7d1;
      }
      .page-title {
        font-size: 24px;
        font-weight: 700;
        line-height: 32px;
        color: #696361;
      }

      /* ─── Product cards ─── */
      .cards-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 0 20px;
        flex-shrink: 0;
      }

      .product-card {
        background: #fdf9f7;
        border: 1px solid #e4d7d1;
        border-radius: 16px;
        padding: 17px;
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .product-img {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        object-fit: cover;
        flex-shrink: 0;
        background: #fff;
      }

      .product-details {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .product-details .name {
        font-size: 14px;
        font-weight: 700;
        line-height: 17.5px;
        color: #696361;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .product-details .source {
        font-size: 12px;
        font-weight: 400;
        line-height: 16px;
        color: #696361;
      }
      .product-details .price {
        font-size: 14px;
        font-weight: 700;
        line-height: 20px;
        color: #696361;
        margin-top: 2px;
      }

      .btn-buy {
        background: #cd6338;
        border: none;
        border-radius: 16px;
        padding: 8px 24px;
        font-family: inherit;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: -0.112px;
        color: #fff;
        cursor: pointer;
        flex-shrink: 0;
        transition: background 0.15s;
      }
      .btn-buy:hover {
        background: #b8512d;
      }

      /* ─── Budget progress ─── */
      .budget-wrap {
        margin: 20px 20px 0;
        flex-shrink: 0;
      }
      .budget-card {
        background: #fdf9f7;
        border: 1px solid #e4d7d1;
        border-radius: 16px;
        padding: 17px;
      }
      .budget-labels {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }
      .budget-used {
        font-size: 12px;
        font-weight: 600;
        line-height: 16px;
        color: #696361;
      }
      .budget-left {
        font-size: 12px;
        font-weight: 700;
        line-height: 16px;
        color: #66b856;
      }
      .budget-track {
        width: 100%;
        height: 10px;
        background: #e4d7d1;
        border-radius: 999px;
        overflow: hidden;
      }
      .budget-fill {
        height: 100%;
        background: #e16d3e;
        border-radius: 999px;
        width: 97.375%; /* 779/800 */
      }

      /* ─── CTA area (above nav) ─── */
      .cta-area {
        border-top: 1px solid #fbf0eb;
        padding: 25px 20px 24px;
        flex-shrink: 0;
      }
      .btn-finish {
        width: 100%;
        height: 52px;
        background: #cd6338;
        border: none;
        border-radius: 16px;
        font-family: inherit;
        font-size: 16px;
        font-weight: 500;
        letter-spacing: -0.128px;
        color: #fff;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn-finish:hover {
        background: #b8512d;
      }
    </style>
  </head>
  <body>
    <div class="cursor rounded"></div>
    <div class="phone" data-nav-active="Home">
      <div class="main">
        <!-- Header -->
        <div class="page-header">
          <button class="back-btn" aria-label="Go back"></button>
          <h1 class="page-title">Products List</h1>
        </div>

        <!-- Product cards -->
        <div class="cards-list">
          <div class="product-card">
            <img
              class="product-img"
              src="assets/decorative/shopping-list/cabinets.jpg"
              onerror="this.src = 'assets/decorative/item-swap/knoxhult.avif'"
              alt="KNOXHULT Cabinets"
            />
            <div class="product-details">
              <span class="name">KNOXHULT Cabinets</span>
              <span class="source">via Amazon</span>
              <span class="price">€349</span>
            </div>
            <button class="btn-buy">Buy</button>
          </div>

          <div class="product-card">
            <img
              class="product-img"
              src="assets/decorative/shopping-list/lamp.png"
              onerror="
                this.src = 'assets/decorative/item-swap/trettioen_lamp.avif'
              "
              alt="TRETTIOTVÅ Lamp"
            />
            <div class="product-details">
              <span class="name">TRETTIOTVÅ Lamp</span>
              <span class="source">via IKEA</span>
              <span class="price">€120</span>
            </div>
            <button class="btn-buy">Buy</button>
          </div>

          <div class="product-card">
            <img
              class="product-img"
              src="assets/decorative/shopping-list/sink.jpg"
              onerror="
                this.src = 'assets/decorative/item-swap/hillesjon_sink.avif'
              "
              alt="HILLESJÖN Sink"
            />
            <div class="product-details">
              <span class="name">HILLESJÖN Sink</span>
              <span class="source">via IKEA</span>
              <span class="price">€196</span>
            </div>
            <button class="btn-buy">Buy</button>
          </div>
        </div>

        <!-- Budget progress -->
        <div class="budget-wrap">
          <div class="budget-card">
            <div class="budget-labels">
              <span class="budget-used">€779 of €800 used</span>
              <span class="budget-left">€21 left</span>
            </div>
            <div class="budget-track">
              <div class="budget-fill"></div>
            </div>
          </div>
        </div>

        <!-- Finish CTA -->
        <div class="cta-area">
          <button
            class="btn-finish"
            onclick="window.location.href = 'home-final.html'"
          >
            Finish
          </button>
        </div>
      </div>
    </div>
    <script src="assets/glow.js"></script>
  </body>
</html>
