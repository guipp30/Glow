<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Glow – Describe Idea</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/glow.css" />
    <style>
      .main {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        padding: 40px 0 0;
      }

      .content {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .heading {
        padding: 0 24px;
        flex-shrink: 0;
      }
      .heading h1 {
        font-size: 20px;
        font-weight: 700;
        line-height: 28px;
        color: #696361;
      }
      .heading p {
        font-size: 14px;
        line-height: 20px;
        color: #8a827f;
        margin-top: 4px;
      }

      .textarea-wrap {
        position: relative;
        margin: 0 24px;
        flex-shrink: 0;
      }
      .idea-textarea {
        width: 100%;
        height: 213px;
        background: #fdf9f7;
        border: 1px solid #faece6;
        border-radius: 16px;
        padding: 12px 16px 32px;
        font-family: inherit;
        font-size: 16px;
        font-weight: 500;
        line-height: 20px;
        color: #696361;
        resize: none;
        outline: none;
        transition: border-color 0.2s;
      }
      .idea-textarea::placeholder {
        color: #b2a8a3;
        font-weight: 400;
      }
      .idea-textarea:focus {
        border-color: #f6d2c3;
      }

      .word-count {
        position: absolute;
        bottom: 10px;
        right: 14px;
        font-size: 10px;
        font-weight: 500;
        color: #b2a8a3;
        pointer-events: none;
      }

      .chips-wrap {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        padding: 0 24px 16px;
        flex-shrink: 0;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 24px;
        border-radius: 64px;
        font-size: 16px;
        font-weight: 500;
        letter-spacing: -0.128px;
        cursor: pointer;
        border: 1px solid #e4d7d1;
        background: #fff;
        color: #b2a8a3;
        transition:
          background 0.18s,
          border-color 0.18s,
          color 0.18s;
        user-select: none;
        white-space: nowrap;
      }
      .chip.active {
        background: #faece6;
        border-color: #f6d2c3;
        color: #5f2e1a;
      }
    </style>
  </head>
  <body>
    <div class="cursor rounded"></div>
    <div class="phone" data-nav-active="Home">
      <div class="main">
        <div class="top-nav">
          <button class="back-btn" aria-label="Go back"></button>
          <span class="step-label">Step 3 of 5</span>
          <button
            class="skip-btn"
            onclick="window.location.href = 'add-a-reference.html'"
          >
            Skip
          </button>
        </div>

        <div class="content">
          <div class="heading">
            <h1>Describe what you love</h1>
            <p>Give a description of styles, ideas, moods...</p>
          </div>

          <div class="textarea-wrap">
            <textarea
              class="idea-textarea"
              id="ideaText"
              maxlength="5000"
              placeholder="I want a bright open kitchen with natural light..."
              oninput="updateCount(this)"
            ></textarea>
            <span class="word-count" id="wordCount">0/1000 Words</span>
          </div>

          <div class="chips-wrap">
            <span class="chip active" onclick="toggleChip(this)">Cozy</span>
            <span class="chip" onclick="toggleChip(this)">Warm</span>
            <span class="chip" onclick="toggleChip(this)">Bold</span>
            <span class="chip" onclick="toggleChip(this)">Minimal</span>
            <span class="chip" onclick="toggleChip(this)">Earthy</span>
            <span class="chip" onclick="toggleChip(this)">Fun</span>
            <span class="chip" onclick="toggleChip(this)">Luxurious</span>
            <span class="chip" onclick="toggleChip(this)">Simple</span>
          </div>
        </div>
      </div>

      <div class="cta">
        <button
          class="btn-primary"
          onclick="window.location.href = 'add-a-reference.html'"
        >
          Continue
        </button>
      </div>
    </div>
    <script src="assets/glow.js"></script>
    <script>
      function updateCount(el) {
        const words =
          el.value.trim() === "" ? 0 : el.value.trim().split(/\s+/).length;
        document.getElementById("wordCount").textContent =
          words + "/1000 Words";
      }
      function toggleChip(el) {
        el.classList.toggle("active");
      }
    </script>
  </body>
</html>
